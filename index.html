<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמה לוובינר המקצועי</title>
    <!-- חיבור לפונט גוגל איכותי ונקרא -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2563eb; /* כחול הייטק מוביל */
            --primary-hover: #1d4ed8;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --bg-gradient: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Assistant', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            max-width: 450px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .logo-placeholder {
            width: 60px;
            height: 60px;
            background: #eff6ff;
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
        }

        .logo-placeholder svg {
            width: 30px;
            height: 30px;
        }

        h1 {
            color: var(--text-main);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            background-color: #f9fafb;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 213, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(37, 99, 213, 0.2);
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .footer-text {
            margin-top: 24px;
            font-size: 12px;
            color: #9ca3af;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- אייקון וידאו/וובינר מינימליסטי בחלק העליון -->
    <div class="logo-placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 20.25h12m-12-3v3m12-3v3M4.5 4.5h15a2.25 2.25 0 012.25 2.25v9a2.25 2.25 0 01-2.25 2.25H4.5A2.25 2.25 0 012.25 15.75v-9A2.25 2.25 0 014.5 4.5z" />
        </svg>
    </div>

    <h1>הצטרפו לוובינר המקצועי</h1>
    <p class="subtitle">הבטיחו את מקומכם עכשיו וקבלו גישה לכלים המובילים ולתכנים המתקדמים ביותר בתחום.</p>

    <form id="webinarForm">
        <div class="form-group">
            <label for="name">שם מלא</label>
            <input type="text" id="name" name="name" placeholder="ישראל ישראלי" required>
        </div>
        
        <div class="form-group">
            <label for="email">כתובת אימייל</label>
            <input type="email" id="email" name="email" placeholder="name@example.com" dir="ltr" required>
        </div>

        <button type="submit">אישור והרשמה לוובינר</button>
    </form>

    <div class="footer-text">
        * קישור לוובינר יישלח לתיבת המייל בסמוך לאירוע
    </div>
</div>

<script>
    const form = document.getElementById('webinarForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // שינוי זמני של כפתור השליחה לחיווי ויזואלי
        const btn = form.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = 'רושם אותך במערכת...';
        btn.disabled = true;

        fetch('https://script.google.com/macros/s/AKfycbzQ4_lUqIX7sIe_g1HV1jt3tSjj90iJ4gkPMSBDlFU18EAGvlIZbJuc0Gq4H1zPEJn0KA/exec', {
            method: 'POST',
            body: new FormData(form),
            mode: 'no-cors' // מניעת שגיאות CORS מול גוגל סקריפט
        }).then(() => {
            alert('נרשמת בהצלחה! נתראה בוובינר.');
            form.reset();
            btn.innerText = originalText;
            btn.disabled = false;
        }).catch(err => {
            alert('אירעה שגיאה, אנא נסה שנית.');
            btn.innerText = originalText;
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
